<!DOCTYPE html>
<html>

<head>

<title>Student Management System</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Student Management System</h1>

<form action="/add" method="POST">

<input
type="text"
name="name"
placeholder="Enter Name"
required>

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<textarea
name="note"
placeholder="Enter Note"
required></textarea>

<button type="submit">
Add Student
</button>

</form>

<hr>

<form method="GET">

<input
type="text"
name="search"
placeholder="Search by Name"
value="{{search}}">

<button>
Search
</button>

</form>

<h2>Student List</h2>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Note</th>
<th>Action</th>

</tr>

{% for student in students %}

<tr>

<td>{{student[0]}}</td>

<td>{{student[1]}}</td>

<td>{{student[2]}}</td>

<td>{{student[3]}}</td>

<td>

<a href="/edit/{{student[0]}}">
<button class="edit">
Edit
</button>
</a>

<a href="/delete/{{student[0]}}">
<button class="delete">
Delete
</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
