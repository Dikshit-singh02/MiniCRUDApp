<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>🎓 Student Management System</h1>

    <p class="subtitle">
        Flask + SQLite CRUD Application
    </p>

    <hr>

    <!-- Add Student Form -->

    <h2>Add Student</h2>

    <form action="/add" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Enter Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <textarea
            name="note"
            placeholder="Enter Note"
            required></textarea>

        <button type="submit">
            Add Student
        </button>

    </form>

    <hr>

    <!-- Search Form -->

    <h2>Search Student</h2>

    <form method="GET">

        <input
            type="text"
            name="search"
            placeholder="Search by Name"
            value="{{ search }}">

        <button type="submit">
            Search
        </button>

    </form>

    <hr>

    <!-- Student Table -->

    <h2>Student List</h2>

    <table>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Note</th>
            <th>Action</th>

        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>

            <td>

                <a href="/edit/{{ student[0] }}">
                    <button type="button" class="edit">
                        Edit
                    </button>
                </a>

                <a href="/delete/{{ student[0] }}"
                   onclick="return confirm('Are you sure you want to delete this student?');">

                    <button type="button" class="delete">
                        Delete
                    </button>

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

    <hr>

    <footer>

        <p>
            Developed by <strong>Dikshit Singh</strong>
        </p>

    </footer>

</body>

</html>
