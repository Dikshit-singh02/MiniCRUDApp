<!DOCTYPE html>

<html>

<head>

<title>Edit Student</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Edit Student</h1>

<form
action="/update/{{student[0]}}"
method="POST">

<input
type="text"
name="name"
value="{{student[1]}}"
required>

<input
type="email"
name="email"
value="{{student[2]}}"
required>

<textarea
name="note"
required>{{student[3]}}</textarea>

<button>
Update Student
</button>

</form>

</body>

</html>
